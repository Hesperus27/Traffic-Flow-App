<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Flow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1e293b" />

  <style>
    body {
      background-color: #1e293b;
      min-height: 100vh;
      color: white;
    }

    .card {
      border-radius: 15px;
      border: none;
    }

    .map-box {
      height: 200px;
      background: #334155;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font-weight: bold;
    }

    canvas {
      background: #f8fafc;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6">

        <div class="card shadow p-4 bg-dark text-light">

          <h2 class="text-center mb-3">🚦 Traffic Flow</h2>

          <div class="map-box mb-3">
            Live Traffic Map
          </div>

          <h5>Alerts</h5>
          <ul id="alertList" class="list-group mb-3">
            <li class="list-group-item">Accident reported on Main Street</li>
            <li class="list-group-item">Heavy congestion at Highway 1</li>
          </ul>

          <div class="input-group mb-3">
            <input type="text" id="alertInput" class="form-control" placeholder="Add traffic alert...">
            <button class="btn btn-danger" onclick="addAlert()">Add</button>
          </div>

          <h5 class="mt-4">Commute History</h5>
          <canvas id="historyChart" height="150"></canvas>

        </div>

      </div>
    </div>
  </div>

<script>
  function addAlert() {
    const input = document.getElementById("alertInput");
    const value = input.value.trim();
    if(value){
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.textContent = value;
      document.getElementById("alertList").appendChild(li);
      input.value = "";
    }
  }

  const canvas = document.getElementById("historyChart");
  const ctx = canvas.getContext("2d");

  const data = [30, 25, 40, 35, 20, 45, 30];

  ctx.beginPath();
  ctx.moveTo(0, 150 - data[0]);

  data.forEach((value, index) => {
    ctx.lineTo(index * 50, 150 - value);
  });

  ctx.strokeStyle = "blue";
  ctx.lineWidth = 2;
  ctx.stroke();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker
      .register("service-worker.js")
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Failed", err));
  }
</script>

</body>
  </html>
